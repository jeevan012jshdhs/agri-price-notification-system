<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin - Agri Notification System</title>
    <link rel="stylesheet" href="style.css" />
</head>

<body>
    <div class="page-wrapper">
        <header>
            <div class="header-container">
                <div>
                    <h1>Admin Page - Agri Notification System</h1>
                    <p class="header-subtitle">Manage and update product prices</p>
                </div>
                <nav>
                    <a href="index.html" class="admin-btn">Home</a>
                </nav>
            </div>
        </header>

        <main>
            <section id="admin-login">
                <h2>Admin Login</h2>
                <form id="loginForm">
                    <label for="username">Username:</label>
                    <input type="text" id="username" name="username" required />

                    <label for="password">Password:</label>
                    <input type="password" id="password" name="password" required />

                    <button type="submit">Login</button>
                </form>
            </section>

            <section id="update-section" style="display: none">
                <h2>Update Product Prices</h2>
                <form id="updateForm">
                    <label for="product">Product Name:</label>
                    <input type="text" id="product" name="product" required />

                    <label for="price">Price:</label>
                    <input type="number" id="price" name="price" required />

                    <button type="submit">Update Price</button>
                </form>
            </section>
        </main>

        <footer>
            <p>&copy; 2024 Agri Notification System | All rights reserved</p>
        </footer>
    </div>

    <script src="script.js"></script>
</body>

</html>
